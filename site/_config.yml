title: Learn Agent Design
description: >-
  A workspace for learning agent design — read a concept, distill it into
  a note, then turn it into an interactive teaching page.
lang: zh-Hant

markdown: kramdown
theme: null

# All Jekyll machinery lives in site/, but the CONTENT source stays the repo
# root (studies/ is the content). Run from site/:
#   bundle exec jekyll serve -s .. -c _config.yml -d _site
# layouts_dir / cache_dir below are relative to that root source.
layouts_dir: site/_layouts
cache_dir: site/.jekyll-cache

# The site publishes ONLY studies/*/pages/ pages (+ the homepage in
# site/index.md). Everything else in the repo (markdown notes, mockups, code)
# is source material that stays private to the repo — docs/ remain the source
# of truth the pages derive from, but they are not rendered into the site.
exclude:
  - site/Gemfile
  - site/Gemfile.lock
  - site/vendor
  - README.md
  - CLAUDE.md
  - "studies/*/docs"
  - "studies/*/code"
  - "studies/*/mockups"

# Apply the shared layout to every markdown page without editing each note's
# front matter — the notes stay exactly as they are for any other consumer.
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  # URL rule: /<topic>/<content>/ — e.g. studies/mcp/pages/101.html publishes
  # at /mcp/101/. Files stay where they live in the repo; only the public URL
  # changes. One scope entry per topic — add a new entry when a new topic
  # publishes its first page.
  - scope:
      path: "studies/mcp"
    values:
      permalink: "/mcp/:basename/"
  - scope:
      path: "studies/agent-anatomy"
    values:
      permalink: "/agent-anatomy/:basename/"
