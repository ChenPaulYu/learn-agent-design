# Build the Jekyll site exactly like local dev does (machinery in site/,
# content source at the repo root) and deploy to GitHub Pages.
# Requires Settings → Pages → Source = "GitHub Actions".
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          # Ruby 3.1, not 3.2+: jekyll 4.2's pathutil dep still calls
          # File.exists?, which Ruby 3.2 removed.
          ruby-version: "3.1"
          bundler-cache: true
          working-directory: site
      - name: Build with Jekyll
        working-directory: site
        run: bundle exec jekyll build -s .. -c _config.yml -d _site
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
